name: tau-assistant-ci

on:
  push:
    paths:
      - "tau-assistant/**"
      - ".github/workflows/tau-assistant-ci.yml"
  pull_request:
    paths:
      - "tau-assistant/**"
      - ".github/workflows/tau-assistant-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tau-assistant
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run assistant behavior harness + full tests
        env:
          PYTHONPATH: .
        run: |
          pytest -q tests/test_eval_harness.py
          pytest -q tests
